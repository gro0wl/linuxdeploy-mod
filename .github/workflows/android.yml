name: Android Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-29" "build-tools;29.0.2"

      - name: Set up JDK 8 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Build debug and release APKs
        run: ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linuxdeploy-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
